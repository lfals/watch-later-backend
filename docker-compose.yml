services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: watch_later
      POSTGRES_USER: watch_later
      POSTGRES_PASSWORD: watch_later
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watch_later"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - ./data/redis:/data

  minio:
    image: watch-later-minio:local
    build:
      context: .
      dockerfile: docker/minio/Dockerfile
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: watch_later
      MINIO_ROOT_PASSWORD: watch_later_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - ./data/minio:/data

  minio-init:
    image: watch-later-minio:local
    build:
      context: .
      dockerfile: docker/minio/Dockerfile
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 watch_later watch_later_dev_secret &&
        mc mb --ignore-existing local/watch-later-media
    restart: "no"

  migrate:
    build:
      context: .
      target: runtime
    env_file: .env
    environment:
      DATABASE_URL: postgres://watch_later:watch_later@postgres:5432/watch_later
      REDIS_URL: redis://redis:6379
    command: ["node", "dist/src/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      target: runtime
    env_file: .env
    environment:
      PORT: 3000
      DATABASE_URL: postgres://watch_later:watch_later@postgres:5432/watch_later
      REDIS_URL: redis://redis:6379
      S3_BUCKET: watch-later-media
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: watch_later
      S3_SECRET_ACCESS_KEY: watch_later_dev_secret
      LOKI_URL: http://loki:3100/loki/api/v1/push
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker-runtime
    env_file: .env
    environment:
      DATABASE_URL: postgres://watch_later:watch_later@postgres:5432/watch_later
      REDIS_URL: redis://redis:6379
      S3_BUCKET: watch-later-media
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: watch_later
      S3_SECRET_ACCESS_KEY: watch_later_dev_secret
      LOKI_URL: http://loki:3100/loki/api/v1/push
    command: ["node", "dist/src/worker.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  admin:
    build:
      context: ../watch-later-admin
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?VITE_CLERK_PUBLISHABLE_KEY is required}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    ports:
      - "5173:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  loki:
    build:
      context: docker/railway/loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    restart: unless-stopped

  grafana:
    build:
      context: docker/railway/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-watch_later_dev_secret}
      GF_USERS_ALLOW_SIGN_UP: "false"
      LOKI_DATASOURCE_URL: http://loki:3100
    ports:
      - "3001:3000"
    depends_on:
      - loki
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
